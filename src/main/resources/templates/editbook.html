<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Kirjakauppa</title>
    <meta charset="UTF-8" />
</head>
<body>
    <h1>Muokkaa kirjaa</h1>

    <form th:object="${book}" th:action="@{../save}" method="post">

        <input type="hidden" th:field="*{id}" />


        <label for="title">Teos</label>
        <input type="text" id="title" th:field="*{title}" />
       

        <label for="author">Tekijä</label>
        <input type="text" id="author" th:field="*{author}" />
        

        <label for="publicationYear">Julkaisuvuosi</label>
        <input type="number" id="publicationYear" th:field="*{publicationYear}" />
       

        <label for="isbn">ISBN</label>
        <input type="number" id="isbn" th:field="*{isbn}" />
      

        <label for="price">Hinta</label>
        <input type="number" step="0.01" id="price" th:field="*{price}" />
        

        <label for="category">Kategoria</label>
        <select id="category" th:field="*{category}">
            <option th:each="category : ${categories}" th:value="${category.categoryId}" th:text="${category.categoryName}"></option>
        </select>
        <div style="clear: both; display: block; height: 10px;"></div>
        <input type="submit" value="Tallenna" />
    </form>
</body>
</html>
